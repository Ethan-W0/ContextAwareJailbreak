
spring:
  application:
    name: context-aware-jailbreak-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:jailbreak_agent}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 580000
      connection-test-query: SELECT 1
      validation-timeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4
          temperature: 0.7

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.jailbreak.agent.persistence.entity
  type-enums-package: com.jailbreak.agent.enums
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.jailbreak.agent: DEBUG
    org.springframework.web: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# App Configuration
app:
  redis:
    state-ttl-minutes: 30

  # Strategy Engine: RULES | LLM
  strategy:
    mode: RULES
    default-llm-model: gpt-4

  # Evaluation Engine
  evaluation:
    model: gpt-4
    secondary-model: gpt-3.5-turbo
    arbitrator-model: gpt-4
    dual-mode: false
    arbitration-threshold: 0.3

  # Attack Orchestration
  orchestration:
    default-max-rounds: 10
    target-timeout-seconds: 30
    max-retries: 2

  # Target Model Config
  target:
    api-key: ${TARGET_API_KEY:placeholder-key}
    base-url: ${TARGET_BASE_URL:http://localhost:8080}
    model-name: ${TARGET_MODEL_NAME:gpt-3.5-turbo}

  # Cost Control
  cost:
    default-max-total-tokens: 500000
    default-max-estimated-cost: 2.00
    exceeded-action: ABORT
    warning-thresholds: 80,90,95

  # User Quota
  quota:
    max-concurrent-tasks: 3
    max-daily-tasks: 20
    max-daily-platform-tokens: 5000000

  # Security
  security:
    aes-key: ${AES_ENCRYPTION_KEY:changeme-256-bit-key-must-be-32chars!}

  # SSE
  sse:
    timeout-ms: 300000
    event-buffer-size: 500

  # Async Thread Pool
  executor:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 100

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:jailbreak-reports}
