# ===========================================
# Context-Aware Jailbreak Agent — 配置文件
# ===========================================

spring.application.name=context-aware-jailbreak-agent

# ── 数据源 ──
spring.datasource.url=jdbc:mysql://localhost:3306/jailbreak_agent?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Redis ──
spring.data.redis.host=localhost
spring.data.redis.port=6379
# AttackState 缓存 TTL: 30 分钟
app.redis.state-ttl-minutes=30

# ── MinIO ──
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=jailbreak-reports

# ── 策略引擎 ──
# 模式: RULES | LLM
app.strategy.mode=RULES
app.strategy.default-llm-model=gpt-4

# ── 评估引擎 ──
# 评估 LLM 模型
app.evaluation.model=gpt-4
# 双评估模式: true=两个模型独立评估+仲裁, false=单模型评估
app.evaluation.dual-mode=false
# 仲裁分歧阈值 (两个评估分数差值超过此值触发仲裁)
app.evaluation.arbitration-threshold=0.3

# ── 攻击编排 ──
# 默认最大轮次
app.orchestration.default-max-rounds=10
# 目标 API 默认超时 (秒)
app.orchestration.target-timeout-seconds=30
# 重试次数
app.orchestration.max-retries=1

# ── 成本控制 ──
# 单任务 token 硬上限
app.cost.default-max-total-tokens=500000
# 单任务费用硬上限 (USD)
app.cost.default-max-estimated-cost=2.00
# 超限处理: ABORT | DEGRADE | NOTIFY
app.cost.exceeded-action=ABORT
# 预警阈值
app.cost.warning-thresholds=80,90,95

# ── 用户配额 ──
# 最大并发任务数
app.quota.max-concurrent-tasks=3
# 每日最大任务数
app.quota.max-daily-tasks=20
# 每日平台 token 配额
app.quota.max-daily-platform-tokens=5000000

# ── 安全 ──
# AES-256 加密密钥 (生产环境通过环境变量注入)
app.security.aes-key=${AES_ENCRYPTION_KEY:changeme-256-bit-key-must-be-32chars!}

# ── SSE ──
# SseEmitter 超时时间 (毫秒)
app.sse.timeout-ms=300000
# 事件缓冲区大小
app.sse.event-buffer-size=500

# ── 异步线程池 ──
app.executor.core-pool-size=4
app.executor.max-pool-size=8
app.executor.queue-capacity=100
